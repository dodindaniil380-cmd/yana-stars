<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>34 звезды для Яны ✨</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
            overflow: hidden;
            background: #010118;
        }

        .intro-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #000000, #02000a);
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 0.5s ease;
        }

        .intro-card {
            background: rgba(20, 15, 45, 0.9);
            backdrop-filter: blur(20px);
            border-radius: 50px;
            padding: 40px 30px;
            text-align: center;
            border: 1px solid rgba(255, 180, 230, 0.6);
            box-shadow: 0 0 50px rgba(255, 80, 180, 0.4);
            width: 85%;
            max-width: 350px;
            animation: gentlePulse 2s infinite alternate;
        }

        @keyframes gentlePulse {
            0% { transform: scale(1); box-shadow: 0 0 30px rgba(255,100,200,0.3);}
            100% { transform: scale(1.02); box-shadow: 0 0 60px rgba(255,100,200,0.6);}
        }

        .intro-card h1 {
            font-size: 1.8rem;
            background: linear-gradient(135deg, #ffd6f0, #ff99dd);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 20px;
        }

        .intro-card input {
            background: rgba(255,255,250,0.12);
            border: 2px solid #ffa5d4;
            padding: 14px 20px;
            border-radius: 50px;
            font-size: 1.2rem;
            color: #fff0fa;
            text-align: center;
            outline: none;
            width: 90%;
            margin-bottom: 20px;
        }

        .intro-card button {
            background: linear-gradient(135deg, #ffaae0, #ff44aa);
            border: none;
            padding: 12px 32px;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: bold;
            color: #2c0a2a;
            cursor: pointer;
            width: 100%;
        }

        .music-controls {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(12px);
            border-radius: 60px;
            padding: 8px 15px;
            display: flex;
            gap: 12px;
            z-index: 200;
            border: 1px solid #ff99cc;
        }

        .music-controls button {
            background: #ff66aa;
            border: none;
            font-size: 1.3rem;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            color: #2a001f;
        }

        .info-panel {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(12px);
            padding: 8px 16px;
            border-radius: 40px;
            color: #ffdeff;
            font-size: 0.7rem;
            z-index: 200;
            pointer-events: none;
            border: 1px solid #ff77aa;
            text-align: center;
            white-space: nowrap;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.96);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(8px);
        }

        .modal-card {
            background: linear-gradient(135deg, #1a0f2a, #0d0720);
            border-radius: 25px;
            width: 85%;
            max-width: 380px;
            padding: 20px;
            text-align: center;
            border: 2px solid #ff99dd;
            max-height: 85%;
            overflow-y: auto;
        }

        .modal-card img {
            width: 100%;
            max-height: 40vh;
            object-fit: contain;
            border-radius: 15px;
            border: 2px solid #ffaadd;
            margin-bottom: 15px;
            background: #000;
        }

        .modal-card h2 {
            color: #ffd6f0;
            font-size: 1.3rem;
            margin-bottom: 10px;
        }

        .modal-card p {
            color: #e0c0ff;
            font-size: 0.85rem;
            line-height: 1.4;
            margin-bottom: 20px;
            white-space: pre-wrap;
        }

        .modal-card button {
            background: linear-gradient(135deg, #ffaae0, #ff44aa);
            border: none;
            padding: 10px 25px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: bold;
            color: #2c0a2a;
            cursor: pointer;
        }

        .close-modal {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 35px;
            color: #ff99cc;
            cursor: pointer;
            background: none;
            border: none;
            z-index: 1001;
        }

        .universe-container {
            display: none;
            width: 100%;
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
        }

        @media (min-width: 768px) {
            .info-panel {
                left: 20px;
                right: auto;
                transform: none;
                font-size: 0.85rem;
                padding: 10px 20px;
            }
        }
    </style>
</head>

        { title: "Поле", desc: "А здесь мы снова в поле, ты лучшее, что со мной случилось", photo: "images/34.jpg" }
    ];

    // Модальное окно
    const modal = document.getElementById('photoModal');
    const modalImage = document.getElementById('modalImage');
    const modalTitle = document.getElementById('modalTitle');
    const modalDesc = document.getElementById('modalDesc');

    function openModal(title, desc, photoUrl) {
        if (photoUrl) {
            modalImage.src = photoUrl;
            modalImage.style.display = "block";
        } else {
            modalImage.style.display = "none";
        }
        modalTitle.textContent = title;
        modalDesc.textContent = desc;
        modal.style.display = 'flex';
    }

    function closeModal() {
        modal.style.display = 'none';
    }

    document.getElementById('closeModalBtn').addEventListener('click', closeModal);
    document.getElementById('modalCloseBtn').addEventListener('click', closeModal);
    modal.addEventListener('click', (e) => { if (e.target === modal) closeModal(); });

    // 3D сцена
    function init3DScene(userName) {
        const container = document.getElementById('universeContainer');
        const infoPanel = document.getElementById('infoPanel');
        const musicPanel = document.getElementById('musicPanel');
        
        container.style.display = 'block';
        infoPanel.style.display = 'block';
        musicPanel.style.display = 'flex';
        
        const isMobile = /Android|webOS|iPhone|iPad|iPod/i.test(navigator.userAgent) || window.innerWidth < 768;
        
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x010118);
        scene.fog = new THREE.FogExp2(0x010118, 0.006);
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, isMobile ? 1.5 : 2, isMobile ? 16 : 14);
        
        const renderer = new THREE.WebGLRenderer({ antialias: !isMobile });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);
        
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 0.3;
        controls.enableZoom = true;
        controls.enablePan = false;
        controls.rotateSpeed = isMobile ? 0.8 : 1;
        controls.target.set(0, 0, 0);
        
        // Кольца
        const ring1 = new THREE.Mesh(
            new THREE.TorusGeometry(4.5, 0.06, 32, 200),
            new THREE.MeshStandardMaterial({ color: 0xff88aa, emissive: 0x552233, emissiveIntensity: 0.3 })
        );
        ring1.rotation.x = Math.PI / 2;
        scene.add(ring1);
        
        const ring2 = new THREE.Mesh(
            new THREE.TorusGeometry(5.8, 0.05, 32, 200),
            new THREE.MeshStandardMaterial({ color: 0x88aaff, emissive: 0x224466, emissiveIntensity: 0.25 })
        );
        ring2.rotation.x = Math.PI / 2 + 0.4;
        ring2.rotation.z = 0.3;
        scene.add(ring2);
        
        const ring3 = new THREE.Mesh(
            new THREE.TorusGeometry(1.2, 0.04, 24, 100),
            new THREE.MeshStandardMaterial({ color: 0xffaa55, emissive: 0xff6600, emissiveIntensity: 0.4 })
        );
        scene.add(ring3);
        
        // Фоновые звёзды
        const bgStarCount = isMobile ? 400 : 800;
        const bgStarsGeo = new THREE.BufferGeometry();
        const bgStarPositions = new Float32Array(bgStarCount * 3);
        for (let i = 0; i < bgStarCount; i++) {
            bgStarPositions[i*3] = (Math.random() - 0.5) * 350;
            bgStarPositions[i*3+1] = (Math.random() - 0.5) * 200;
            bgStarPositions[i*3+2] = (Math.random() - 0.5) * 120 - 60;
        }
        bgStarsGeo.setAttribute('position', new THREE.BufferAttribute(bgStarPositions, 3));
        const backgroundStars = new THREE.Points(bgStarsGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 0.1, transparent: true, opacity: 0.4 }));
        scene.add(backgroundStars);
        
        // Создание звезды
        function createStar(color, size = 0.28, isSpecial = false) {
            const group = new THREE.Group();
            const core = new THREE.Mesh(
                new THREE.SphereGeometry(size * 0.5, 8, 8),
                new THREE.MeshStandardMaterial({ color: color, emissive: color, emissiveIntensity: 0.5 })
            );
            group.add(core);
            const rayCount = isSpecial ? 6 : 5;
            for (let i = 0; i < rayCount; i++) {
                const angle = (i / rayCount) * Math.PI * 2;
                const ray = new THREE.Mesh(
                    new THREE.ConeGeometry(size * 0.12, size * 1.2, 4),
                    new THREE.MeshStandardMaterial({ color: color, emissive: color, emissiveIntensity: 0.4 })
                );
                ray.position.set(Math.cos(angle) * (size * 0.55), Math.sin(angle) * (size * 0.55), 0);
                ray.rotation.z = angle;
                group.add(ray);
            }
            return group;
        }
        
        const starsGroup = new THREE.Group();
        scene.add(starsGroup);
        const starObjects = [];
        
        // 33 звезды
        for (let i = 0; i < memories.length; i++) {
            const mem = memories[i];
            const radius = 4 + Math.random() * 3;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(2 * Math.random() - 1);
            const x = radius * Math.sin(phi) * Math.cos(theta);
            const y = radius * Math.sin(phi) * Math.sin(theta) * 0.8;
            const z = radius * Math.cos(phi);
            const starColor = ["#FFD700", "#FFC125", "#FFB90F"][Math.floor(Math.random() * 3)];
            const star = createStar(starColor, 0.28);
            star.position.set(x, y, z);
            starsGroup.add(star);
            starObjects.push({
                group: star, title: mem.title, desc: mem.desc, photo: mem.photo, isSpecial: false,
                defaultX: x, defaultY: y, defaultZ: z, floatSpeed: 0.2 + Math.random() * 0.4
            });
        }
        
        // 34-я звезда (особенная)
        const specialStar = createStar("#FFD700", 0.48, true);
        specialStar.position.set(1.5, 1.2, 2.5);
        starsGroup.add(specialStar);
        starObjects.push({
            group: specialStar, title: "💛 МОЯ ЛЮБОВЬ К ТЕБЕ 💛", desc: loveText, isSpecial: true,
            defaultX: 1.5, defaultY: 1.2, defaultZ: 2.5, floatSpeed: 0.35
        });
        
        // Освещение
        const ambientLight = new THREE.AmbientLight(0x331144);
        scene.add(ambientLight);
        const mainLight = new THREE.DirectionalLight(0xffaaee, 0.6);
        mainLight.position.set(2, 3, 5);
        scene.add(mainLight);
        const backLight = new THREE.PointLight(0x6688ff, 0.3);
        backLight.position.set(-2, -1, -4);
        scene.add(backLight);
        
        // Взаимодействие
        const infoSpan = document.getElementById('hoverMemoryText');
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        let currentHovered = null;
        let lastTouchTime = 0;
        
        function checkIntersection(x, y) {
            const rect = renderer.domElement.getBoundingClientRect();
            mouse.x = ((x - rect.left) / rect.width) * 2 - 1;
            mouse.y = -((y - rect.top) / rect.height) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(starObjects.map(s => s.group), true);
            for (let i = 0; i < intersects.length; i++) {
                let obj = intersects[i].object;
                while (obj.parent) {
                    const found = starObjects.find(s => s.group === obj);
                    if (found) return found;
                    obj = obj.parent;
                }
            }
            return null;
        }
        
        // Мышь для ПК
        window.addEventListener('mousemove', (e) => {
            const hit = checkIntersection(e.clientX, e.clientY);
            if (hit && currentHovered !== hit.group) {
                if (currentHovered) currentHovered.children.forEach(c => { if (c.material) c.material.emissiveIntensity = 0.5; });
                currentHovered = hit.group;
                currentHovered.children.forEach(c => { if (c.material) c.material.emissiveIntensity = 1.0; });
                infoSpan.innerHTML = hit.isSpecial ? `💛✨ ${hit.title} ✨💛` : `📸 ${hit.title}`;
            } else if (!hit && currentHovered) {
                currentHovered.children.forEach(c => { if (c.material) c.material.emissiveIntensity = 0.5; });
                currentHovered = null;
                infoSpan.innerHTML = `Наведи на звезду | Нажми — откроется фото`;
            }
        });
        
        window.addEventListener('click', (e) => {
            // Игнорируем если прошло меньше 50мс после касания (чтобы не дублировать)
            if (Date.now() - lastTouchTime < 50) return;
            const hit = checkIntersection(e.clientX, e.clientY);
            if (hit) {
                if (hit.isSpecial) {
                    alert(`💛💛💛 ${hit.title} 💛💛💛\n\n${hit.desc}\n\n`);
                } else {
                    openModal(hit.title, hit.desc, hit.photo);
                }
            }
        });
        
        // Touch для телефона (исправленный)
        let touchStartX = 0;
        let touchStartY = 0;
        let isDragging = false;
        
        renderer.domElement.addEventListener('touchstart', (e) => {
            if (e.touches.length) {
                touchStartX = e.touches[0].clientX;
                touchStartY = e.touches[0].clientY;
                isDragging = false;
            }
        });
        
        renderer.domElement.addEventListener('touchmove', (e) => {
            if (e.touches.length) {
                const deltaX = Math.abs(e.touches[0].clientX - touchStartX);
                const deltaY = Math.abs(e.touches[0].clientY - touchStartY);
                if (deltaX > 10 || deltaY > 10) {
                    isDragging = true;
                }
            }
        });
        
        renderer.domElement.addEventListener('touchend', (e) => {
            if (!isDragging && e.changedTouches.length) {
                lastTouchTime = Date.now();
                const hit = checkIntersection(e.changedTouches[0].clientX, e.changedTouches[0].clientY);
                if (hit) {
                    if (hit.isSpecial) {
                        alert(`💛💛💛 ${hit.title} 💛💛💛\n\n${hit.desc}\n\n✨ Твой Данька, который любит тебя больше всех на свете ✨`);
                    } else {
                        openModal(hit.title, hit.desc, hit.photo);
                    }
                }
            }
        });
        
        // Анимация
        let time = 0;
        function animate() {
            requestAnimationFrame(animate);
            time += 0.012;
            
            ring1.rotation.z = time * 0.3;
            ring2.rotation.y = time * 0.2;
            ring3.position.x = 1.5 + Math.sin(time * 1.5) * 0.08;
            ring3.position.y = 1.2 + Math.cos(time * 1.8) * 0.06;
            ring3.position.z = 2.5 + Math.sin(time * 1.2) * 0.05;
            ring3.rotation.z = time * 2;
            
            starObjects.forEach((obj, idx) => {
                obj.group.position.x = obj.defaultX + Math.sin(time * obj.floatSpeed + idx) * 0.05;
                obj.group.position.y = obj.defaultY + Math.cos(time * obj.floatSpeed * 0.9 + idx) * 0.05;
                const scale = 1 + Math.sin(time * 2.5 + idx) * 0.03;
                obj.group.scale.set(scale, scale, scale);
            });
            
            backgroundStars.rotation.y += 0.0002;
            controls.update();
            renderer.render(scene, camera);
        }
        
        animate();
        
        // Музыка
        const bgMusic = new Audio("song.mp3");
        bgMusic.loop = true;
        bgMusic.volume = 0.3;
        document.getElementById('playMusic').onclick = () => bgMusic.play().catch(e => console.log());
        document.getElementById('pauseMusic').onclick = () => bgMusic.pause();
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    }
    
    // Запуск
    const overlay = document.getElementById('introOverlay');
    const enterBtn = document.getElementById('enterUniverseBtn');
    const nameInput = document.getElementById('girlName');
    
    enterBtn.addEventListener('click', () => {
        let userName = nameInput.value.trim();
        if (userName === "") userName = "Яна";
        
        overlay.style.opacity = '0';
        setTimeout(() => {
            overlay.style.display = 'none';
            init3DScene(userName);
        }, 500);
    });
</script>
</body>
</html>
