    function createStar(color, size = 0.32, isSpecial = false) {
        const group = new THREE.Group();

        const core = new THREE.Mesh(
            new THREE.SphereGeometry(size * 0.5, 16, 16),
            new THREE.MeshStandardMaterial({ color: color, emissive: color, emissiveIntensity: 0.6, metalness: 0.7 })
        );
        group.add(core);

        const rayCount = isSpecial ? 8 : 5;
        const rayLength = size * 1.5;
        const rayWidth = size * 0.2;

        for (let i = 0; i < rayCount; i++) {
            const angle = (i / rayCount) * Math.PI * 2;
            const ray = new THREE.Mesh(
                new THREE.ConeGeometry(rayWidth, rayLength, 8),
                new THREE.MeshStandardMaterial({ color: color, emissive: color, emissiveIntensity: isSpecial ? 0.7 : 0.5 })
            );
            ray.position.set(Math.cos(angle) * (size * 0.7), Math.sin(angle) * (size * 0.7), 0);
            ray.rotation.z = angle;
            group.add(ray);
        }

        if (!isSpecial) {
            for (let i = 0; i < 5; i++) {
                const angle = (i / 5) * Math.PI * 2 + Math.PI / 5;
                const ray = new THREE.Mesh(
                    new THREE.ConeGeometry(rayWidth * 0.7, rayLength * 0.7, 6),
                    new THREE.MeshStandardMaterial({ color: color, emissive: color, emissiveIntensity: 0.4 })
                );
                ray.position.set(Math.cos(angle) * (size * 0.5), Math.sin(angle) * (size * 0.5), 0);
                ray.rotation.z = angle;
                group.add(ray);
            }
        }

        const glowMat = new THREE.MeshBasicMaterial({ color: color, transparent: true, opacity: isSpecial ? 0.2 : 0.1, side: THREE.BackSide });
        const glow = new THREE.Mesh(new THREE.SphereGeometry(size * 1.1, 8, 8), glowMat);
        group.add(glow);

        return group;
    }

        isSpecial: true,
        photo: null,
        defaultX: 1.8, defaultY: 1.2, defaultZ: 2.5,
        floatSpeed: 0.5,
        floatOffset: 999,
        ring: loveRing
    });

    const ambientLight = new THREE.AmbientLight(0x221133);
    scene.add(ambientLight);
    const mainLight = new THREE.PointLight(0xffaaee, 0.7, 30);
    mainLight.position.set(2, 4, 6);
    scene.add(mainLight);
    const backLight = new THREE.PointLight(0x6688ff, 0.4);
    backLight.position.set(-2, -1, -5);
    scene.add(backLight);

    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();
    const infoSpan = document.getElementById('hoverMemoryText');
    let currentHovered = null;

    function handleInteraction(x, y) {
        mouse.x = (x / renderer.domElement.clientWidth) * 2 - 1;
        mouse.y = -(y / renderer.domElement.clientHeight) * 2 + 1;

        raycaster.setFromCamera(mouse, camera);
        const intersects = raycaster.intersectObjects(starObjects.map(s => s.group), true);

        let hitStar = null;
        for (let i = 0; i < intersects.length; i++) {
            let obj = intersects[i].object;
            while (obj.parent) {
                if (starObjects.find(s => s.group === obj)) {
                    hitStar = obj;
                    break;
                }
                obj = obj.parent;
            }
            if (hitStar) break;
        }

        if (hitStar && starObjects.find(s => s.group === hitStar)) {
            const hitData = starObjects.find(s => s.group === hitStar);
            if (currentHovered !== hitStar) {
                currentHovered = hitStar;
                if (hitData.isSpecial) {
                    infoSpan.innerHTML = `💛✨ ${hitData.title} ✨💛 — нажми, чтобы прочитать признание`;
                } else {
                    infoSpan.innerHTML = `📸 ${hitData.title} — нажми, чтобы открыть фото и историю`;
                }
            }
            return hitData;
        } else {
            if (currentHovered) {
                currentHovered = null;
                infoSpan.innerHTML = `Наведи на звезду — узнай название | Кликни — откроется фото`;
            }
            return null;
        }
    }

    const modal = document.getElementById('photoModal');
    const modalImage = document.getElementById('modalImage');
    const modalTitle = document.getElementById('modalTitle');
    const modalDesc = document.getElementById('modalDesc');
    const closeModalBtn = document.getElementById('closeModalBtn');
    const modalCloseBtn = document.getElementById('modalCloseBtn');

    function openModal(title, desc, photoUrl) {
        modalImage.src = photoUrl;
        modalTitle.textContent = title;
        modalDesc.textContent = desc;
        modal.style.display = 'flex';
    }

    function closeModal() {
        modal.style.display = 'none';
    }

    closeModalBtn.addEventListener('click', closeModal);
    modalCloseBtn.addEventListener('click', closeModal);
    modal.addEventListener('click', (e) => {
        if (e.target === modal) closeModal();
    });

    window.addEventListener('mousemove', (event) => {
        handleInteraction(event.clientX, event.clientY);
    });

    window.addEventListener('click', (event) => {
        const hitData = handleInteraction(event.clientX, event.clientY);
        if (hitData) {
            if (hitData.isSpecial) {
                alert(`💛💛💛 ${hitData.title} 💛💛💛\n\n${hitData.desc}\n\n✨ Твой программист, который любит тебя больше всех звёзд на небе ✨`);
            } else {
                openModal(hitData.title, hitData.desc, hitData.photo);
            }
        }
    });

    let touchTimeout;
    renderer.domElement.addEventListener('touchmove', (event) => {
        event.preventDefault();
        if (event.touches.length) {
            handleInteraction(event.touches[0].clientX, event.touches[0].clientY);
        }
    });

    renderer.domElement.addEventListener('touchstart', (event) => {
        if (event.touches.length) {
            const hitData = handleInteraction(event.touches[0].clientX, event.touches[0].clientY);
            if (hitData) {
                touchTimeout = setTimeout(() => {
                    if (hitData.isSpecial) {
                        alert(`💛💛💛 ${hitData.title} 💛💛💛\n\n${hitData.desc}\n\n✨ Твой программист, который любит тебя больше всех звёзд на небе ✨`);
                    } else {
                        openModal(hitData.title, hitData.desc, hitData.photo);
                    }
                }, 100);
            }
        }
    });

    renderer.domElement.addEventListener('touchend', () => {
        if (touchTimeout) clearTimeout(touchTimeout);
    });

    let time = 0;

    function animate() {
        requestAnimationFrame(animate);
        time += 0.012;

        starObjects.forEach((obj, idx) => {
            if (!obj.isSpecial) {
                obj.group.position.x = obj.defaultX + Math.sin(time * obj.floatSpeed + obj.floatOffset) * 0.06;
                obj.group.position.y = obj.defaultY + Math.cos(time * obj.floatSpeed * 0.9 + idx) * 0.06;
                obj.group.position.z = obj.defaultZ + Math.sin(time * obj.floatSpeed * 0.7 + idx) * 0.05;
            } else {
                obj.group.position.x = obj.defaultX + Math.sin(time * obj.floatSpeed) * 0.08;
                obj.group.position.y = obj.defaultY + Math.cos(time * obj.floatSpeed * 1.2) * 0.06;
                obj.group.position.z = obj.defaultZ + Math.sin(time * obj.floatSpeed * 0.9) * 0.05;
                if (obj.ring) obj.ring.rotation.z = time * 2;
            }

            const scale = 1 + Math.sin(time * 3 + idx) * 0.04;
            obj.group.scale.set(scale, scale, scale);
        });

        backgroundStarsField.rotation.y += 0.0002;
        controls.update();
        renderer.render(scene, camera);
    }

    animate();

    const overlay = document.getElementById('introOverlay');
    const enterBtn = document.getElementById('enterUniverseBtn');
    const nameInput = document.getElementById('girlName');
    const infoPanel = document.getElementById('infoPanel');
    const musicPanel = document.getElementById('musicPanel');
    const instr = document.getElementById('instructionText');

    const bgMusic = new Audio("song.mp3");
    bgMusic.loop = true;
    bgMusic.volume = 0.35;

    enterBtn.addEventListener('click', () => {
        let userName = nameInput.value.trim();
        if (userName === "") userName = "Яна";
        window.currentUserName = userName;

        overlay.style.opacity = '0';
        setTimeout(() => {
            overlay.style.display = 'none';
            infoPanel.style.display = 'block';
            musicPanel.style.display = 'flex';
            instr.style.display = 'block';
        }, 1300);
    });

    document.getElementById('play3dMusic').addEventListener('click', () => {
        bgMusic.play().catch(e => console.log("кликни ещё раз"));
    });
    document.getElementById('pause3dMusic').addEventListener('click', () => {
        bgMusic.pause();
    });

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    console.log("✨ 33 звезды + 1 особенная готовы ✨");
</script>
</body>
</html>
